name: Deploy App

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ---------------------------
      # FRONTEND BUILD
      # ---------------------------
      - name: Create frontend .env.production
        run: |
          cat <<EOF > .env.production
          VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          EOF

      - name: Install root dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy frontend build (SAFE)
        run: |
          rsync -av dist/ /var/www/myapp/ \
            --exclude=".env" \
            --exclude="server" \
            --exclude="uploads"

      # ---------------------------
      # BACKEND DEPLOY
      # ---------------------------
      - name: Deploy backend code (SAFE)
        run: |
          rsync -av server/ /var/www/myapp/server/ \
            --exclude=".env"

      - name: Ensure backend .env exists (SAFE)
        run: |
          ssh jebadeiah@192.168.0.121 << 'EOF'
          cd /var/www/myapp/server
          touch .env
          grep -qxF "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" .env || echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" >> .env
          grep -qxF "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" .env || echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          grep -qxF "JWT_SECRET=${{ secrets.JWT_SECRET }}" .env || echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          grep -qxF "MONGO_URI=${{ secrets.MONGO_URI }}" .env || echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
          EOF

      - name: Install backend dependencies
        run: |
          cd /var/www/myapp/server
          npm install --omit=dev

      - name: Restart backend with PM2
        run: |
          pm2 restart myapp-backend || pm2 start /var/www/myapp/server/server.js --name myapp-backend
